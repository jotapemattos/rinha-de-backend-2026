x-api: &api
  image: jotapemattos/rinha-de-backend-2026:latest
  restart: always
  volumes:
    - socks:/socks
  deploy:
    resources:
      limits:
        cpus: "0.45"
        memory: "160MB"

services:
  api1:
    <<: *api
    environment:
      UDS_PATH: /socks/api1.sock
    healthcheck:
      test: ["CMD-SHELL", "test -S /socks/api1.sock"]
      interval: 3s
      timeout: 2s
      retries: 20
      start_period: 30s

  api2:
    <<: *api
    environment:
      UDS_PATH: /socks/api2.sock
    healthcheck:
      test: ["CMD-SHELL", "test -S /socks/api2.sock"]
      interval: 3s
      timeout: 2s
      retries: 20
      start_period: 30s

  haproxy:
    image: haproxy:alpine
    restart: always
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - socks:/socks
    ports:
      - "9999:9999"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "20MB"

volumes:
  socks:

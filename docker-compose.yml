x-api: &api
  image: jotapemattos/rinha-de-backend-2026:latest
  volumes:
    - socks:/socks
  healthcheck:
    test: ["CMD-SHELL", "test -S $$UDS_PATH"]
    interval: 2s
    timeout: 1s
    retries: 60
    start_period: 30s
  deploy:
    resources:
      limits:
        cpus: "0.45"
        memory: "160MB"

services:
  api1:
    <<: *api
    environment:
      UDS_PATH: /socks/api1.sock

  api2:
    <<: *api
    environment:
      UDS_PATH: /socks/api2.sock

  haproxy:
    image: haproxy:alpine
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - socks:/socks
    ports:
      - "9999:9999"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "20MB"

volumes:
  socks:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "mode=1777"

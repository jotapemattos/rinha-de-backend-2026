x-api: &api
  image: jotapemattos/rinha-de-backend-2026:latest
  environment:
    PORT: 3000
  expose:
    - "3000"
  deploy:
    resources:
      limits:
        cpus: "0.40"
        memory: "160MB"

services:
  api1:
    <<: *api
  api2:
    <<: *api

  haproxy:
    image: haproxy:alpine
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "20MB"

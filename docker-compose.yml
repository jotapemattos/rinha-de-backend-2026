x-api: &api
  image: jotapemattos/rinha-de-backend-2026:latest
  restart: always
  volumes:
    - socks:/socks
  deploy:
    resources:
      limits:
        cpus: "0.45"
        memory: "160MB"

services:
  api1:
    <<: *api
    environment:
      UDS_PATH: /socks/api1.sock
    healthcheck:
      test: ["CMD-SHELL", "bun --eval \"const r=await fetch('http://localhost/ready',{unix:'/socks/api1.sock'}).catch(()=>null);process.exit(r?.ok?0:1)\""]
      interval: 2s
      timeout: 3s
      start_period: 10s
      retries: 15

  api2:
    <<: *api
    environment:
      UDS_PATH: /socks/api2.sock
    healthcheck:
      test: ["CMD-SHELL", "bun --eval \"const r=await fetch('http://localhost/ready',{unix:'/socks/api2.sock'}).catch(()=>null);process.exit(r?.ok?0:1)\""]
      interval: 2s
      timeout: 3s
      start_period: 10s
      retries: 15

  haproxy:
    image: haproxy:alpine
    restart: always
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - socks:/socks
    ports:
      - "9999:9999"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "20MB"

volumes:
  socks:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=4m,mode=0777"
